<!DOCTYPE html>
<html lang="en">
<head>
  <title>NikhilVarat</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
<br><br>
<h1 class="text-center">Nikhil Varat Icard <a href="/index" class="btn btn-danger text-right">Back</a>
</h1><br><br>

<div class="contact py-sm-5 py-4">
		<div class="container py-xl-4 py-lg-2">
		<!-- form -->
		<form id="form" th:action="@{/image/saveImageDetails}" method="post">
				<div class="contact-grids1 w3agile-6">
					<div class="row">
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">Name</label>
							<input type="text" class="form-control" placeholder="Name" id="name" name="name" required="required">
							<p id="error_name"></p>
						</div>
						
						
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">Father's Name</label>
							<input type="text" class="form-control" placeholder="fathername" id="fathername" name="fathername" required="required">
							<p id="error_name"></p>
						</div>


						
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">Date of birth</label>
							<input type="text" class="form-control" placeholder="dob" id="dob" name="dob" required="required">
							<p id="error_name"></p>
						</div>
						
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">occupation</label>
							<input type="text" class="form-control" placeholder="occupation" id="occupation" name="occupation" required="required">
							<p id="error_name"></p>
						</div>
						

						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">village</label>
							<input type="text" class="form-control" placeholder="village" id="village" name="village" required="required">
							<p id="error_name"></p>
						</div>

						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">post</label>
							<input type="text" class="form-control" placeholder="post" id="post" name="post" required="required">
							<p id="error_name"></p>
						</div>


						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">dist</label>
							<input type="text" class="form-control" placeholder="dist" id="dist" name="dist" required="required">
							<p id="error_name"></p>
						</div>

						
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">City</label>
							<textarea class="form-control" placeholder="city" id="city" rows="3" cols="45" name="city" required="required"></textarea>
							<p id="error_description"></p>
						</div>
						
								<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">pin</label>
							<textarea class="form-control" placeholder="pin" id="pin" rows="3" cols="45" name="pin" required="required"></textarea>
							<p id="error_description"></p>
						</div>				
						
						
						
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">State</label>
							<textarea class="form-control" placeholder="state" id="state" rows="3" cols="45" name="state" required="required"></textarea>
							<p id="error_description"></p>
						</div>
						
						
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">contact</label>
							<input type="text" class="form-control" placeholder="contact" id="contact" name="contact" required="required">
							<p id="error_name"></p>
						</div>
						
							
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">gender</label>
							<textarea class="form-control" placeholder="gender" id="gender" rows="3" cols="45" name="gender" required="required"></textarea>
							<p id="error_description"></p>
						</div>					
						
						
						<div class="col-md-6 col-sm-6 contact-form1 form-group">
							<label class="col-form-label">Image</label>
							<input type="file" class="form-control" placeholder="" name="image" id="image" required="required">
							<p id="error_file"></p>
						</div>
						

					</div>
					
						<div class="right-w3l col-md-6">
							<input type="button" id="submit" class="btn btn-primary form-control" value="Submit">
							<br><br>
						</div>
						<a href="/image/show" style="float:left;" class="btn btn-success text-right">Show All</a>
				</div>
				<br>
				<div id="success" class="text-center" style="color:green;"></div>
				<div id="error" class="text-center" style="color:red;"></div>
			</form>
		</div>
	</div>
<p class="text-center">
  	<img src="/images/loader.gif" alt="loader" style="width: 150px;height: 120px;" id="loader">
</p>
	<script src="/js/product.js"></script>
</body>
</html>
